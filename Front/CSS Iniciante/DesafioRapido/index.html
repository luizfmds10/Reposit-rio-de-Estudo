<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classe exercício</title>

    <style>
        .navi a {
            color: blueviolet;
            text-decoration: none;
            padding: 0.5em 1em;
            font-size: 2em;
        }
        .navi a:hover {
            background-color: purple;
            color: white;
        }
        .navi a:active {
            color: lightblue;
        }
        
    </style>

</head>
<body>
    <span class="navi">
        <a href="#">Home</a> |
        <a href="#">Sobre</a>  |
        <a href="#">Empresa</a> |
        <a href="#">Produtos</a> |
        <a href="#">Contato</a> 
    </span>
    
</body>
</html>
